MpcLocalPlannerROS:

  odom_topic: odom
    
   ## Robot settings
  # IMPORTANT: max_vel_x bounds the MPC's REAL lookahead distance.
  #   plan_distance ≈ max_vel_x * (grid_size_ref - 1) * dt_ref
  #   0.5 * 29 * 0.4 = 5.8 m
  # i.e. raising max_vel_x is the only way to actually use a 5 m global lookahead.
  robot:
    type: "unicycle"
    unicycle:
      max_vel_x: 0.5             # was 0.2 - tripled so MPC can plan ~5 m ahead
      max_vel_x_backwards: 0.0
      max_vel_theta: 0.8          # was 0.4 - allows sharper turns to escape narrow passages
      min_vel_theta: -0.8
      acc_lim_x: 0.2              # was 0.05 - was too soft, MPC couldn't speed up/slow down responsively
      dec_lim_x: 0.5              # was 0.3
      acc_lim_theta: 0.6          # was 0.2

  ## Footprint model for collision avoidance
  footprint_model:
    type: "circular"
    radius: 0.2
    is_footprint_dynamic: False

  ## Collision avoidance
  collision_avoidance:
    min_obstacle_dist: 0.6        # was 0.35 - keeps the robot ~0.6 m off lethal cells (robot_radius 0.3 + 0.3 buffer)
    enable_dynamic_obstacles: False
    force_inclusion_dist: 1.2     # was 1.0 - lets MPC "see" the obstacle earlier and curve away sooner
    cutoff_dist: 5.0              # matches the 5 m obstacle_range
    include_costmap_obstacles: True
    costmap_obstacles_behind_robot_dist: 1.5  # was 1.0
    collision_check_no_poses: 25  # was 20 - finer trajectory collision sampling

  ## Planning grid
  grid:
    type: "fd_grid"
    grid_size_ref: 30   # horizon T = (30-1)*0.4 = 11.6 s; combined with max_vel_x=0.5 gives ~5.8 m real lookahead
    dt_ref: 0.4         # was 0.3 - coarser dt lets the same grid_size cover more time/distance
    xf_fixed: [False, False, False] # Unfix final state -> we use terminal cost below
    warm_start: True
    collocation_method: "forward_differences"
    cost_integration_method: "left_sum"
    variable_grid:
      enable: False # We want a fixed grid  
      min_dt: 0.0;
      max_dt: 10.0;
      grid_adaptation:
        enable: True
        dt_hyst_ratio: 0.1
        min_grid_size: 2
        max_grid_size: 50

  ## Planning options
  planning:
    objective:
      type: "quadratic_form" # minimum_time requires grid/variable_grid/enable=True and grid/xf_fixed set properly
      quadratic_form:
        state_weights: [3.0, 3.0, 0.01]
        control_weights: [0.1, 0.075]
        integral_form: False
    terminal_cost:
      type: "quadratic" # can be "none"
      quadratic:
        final_state_weights: [10.0, 10.0, 0.01]
    terminal_constraint:
      type: "none" # can be "none"
      l2_ball:
        weight_matrix: [1.0, 1.0, 1.0]
        radius: 5

  ## Controller options
  controller:
    outer_ocp_iterations: 1
    xy_goal_tolerance: 0.10
    yaw_goal_tolerance: 0.10
    global_plan_overwrite_orientation: true
    global_plan_prune_distance: 1.0
    allow_init_with_backward_motion: False
    max_global_plan_lookahead_dist: 6.0   # was 5.0 - keep ~0.5 m of slack beyond the MPC real horizon (5.8 m) so the goal-attractor stays informative
    force_reinit_new_goal_dist: 1.0
    force_reinit_new_goal_angular: 1.57
    force_reinit_num_steps: 0
    prefer_x_feedback: True
    publish_ocp_results: False
    
  ## Solver settings
  solver:
    type: "ipopt"
    ipopt:
      iterations: 100
      max_cpu_time: -1.0
      ipopt_numeric_options:
        tol: 1e-4
      ipopt_string_options:
        linear_solver: "mumps" 
        hessian_approximation: "exact" # exact or limited-memory
    lsq_lm:
      iterations: 10
      weight_init_eq: 2
      weight_init_ineq: 2
      weight_init_bounds: 2
      weight_adapt_factor_eq: 1.5
      weight_adapt_factor_ineq: 1.5
      weight_adapt_factor_bounds: 1.5
      weight_adapt_max_eq: 500
      weight_adapt_max_ineq: 500
      weight_adapt_max_bounds: 500
